<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support – Manga Elite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #0a0a0f;
      --ink-2: #12121a;
      --border: rgba(255,255,255,0.07);
      --white: #f5f3ee;
      --white-muted: rgba(245,243,238,0.55);
      --accent: #ff3e3e;
      --accent-2: #ff7a3e;
      --grad-accent: linear-gradient(135deg, #ff3e3e, #ff7a3e);
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--ink);
      color: var(--white);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(16px);
    }
    .logo { font-family: var(--font-display); font-size: 1.5rem; letter-spacing: 0.04em; }
    .logo span { color: var(--accent); }

    /* BG ORBS */
    .bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      overflow: hidden;
    }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(110px); opacity: 0.22;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #ff3e3e, transparent 70%);
      top: -160px; left: -160px;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #3e3eff, transparent 70%);
      bottom: -100px; right: -100px;
    }
    .halftone {
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      position: relative;
      z-index: 1;
    }

    .card {
      background: var(--ink-2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 56px 52px;
      max-width: 540px;
      width: 100%;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    .card-icon {
      font-size: 2.8rem;
      margin-bottom: 20px;
      display: block;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 2.8rem;
      letter-spacing: 0.04em;
      margin-bottom: 16px;
    }

    .card-desc {
      font-size: 1rem;
      color: var(--white-muted);
      line-height: 1.75;
      margin-bottom: 40px;
    }

    .divider {
      width: 40px; height: 2px;
      background: var(--grad-accent);
      border-radius: 2px;
      margin: 0 auto 40px;
    }

    .email-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .email-address {
      font-size: 1.15rem;
      font-weight: 500;
      color: var(--white);
      margin-bottom: 32px;
      word-break: break-all;
    }

    .btn-contact {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 15px 36px;
      background: var(--grad-accent);
      border-radius: 100px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 8px 28px rgba(255,62,62,0.35);
    }
    .btn-contact:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 40px rgba(255,62,62,0.5);
    }
    .btn-contact:active {
      transform: translateY(0);
      opacity: 0.88;
    }

    /* FOOTER */
    footer {
      position: relative; z-index: 1;
      padding: 24px;
      text-align: center;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: rgba(245,243,238,0.25);
    }

    @media (max-width: 480px) {
      .card { padding: 40px 28px; }
      .card-title { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

  <div class="bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="halftone"></div>
  </div>

  <nav>
    <div class="logo">MANGA<span>ELITE</span></div>
  </nav>

  <main>
    <div class="card">
      <span class="card-icon">🎧</span>
      <h1 class="card-title">Support Center</h1>
      <div class="divider"></div>
      <p class="card-desc">
        Having trouble with the app? We're here to help.<br/>
        Whether it's a bug, a question, or just feedback —
        reach out and we'll get back to you as soon as possible.
      </p>

      <p class="email-label">Contact us at</p>
      <p class="email-address">mangaelite.support@gmail.com</p>

      <a class="btn-contact"
         href="mailto:mangaelite.support@gmail.com?subject=Support%20Request%20–%20Manga%20Elite">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
        Send us an Email
      </a>
    </div>
  </main>

  <footer>
    © 2025 Manga Elite. All rights reserved.
  </footer>

</body>
</html>
